{% extends "base.html" %}
{% block title %}Connexion — Y-Plaza{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="auth-card">
    <div class="auth-card__header">
      <a href="/" class="logo-text"><span class="logo-y">Y</span>-Plaza</a>
      <h1>Connexion</h1>
      <p>Accédez à votre espace personnel</p>
    </div>

    <div id="alert" class="alert hidden" role="alert" aria-live="assertive"></div>

    <form id="login-form" class="auth-form" novalidate>
      <div class="form-group">
        <label for="email" class="form-label">Adresse email</label>
        <input
          id="email" name="email" type="email" class="input"
          placeholder="vous@exemple.fr" autocomplete="email"
          required aria-required="true"
        />
        <span class="field-error" id="email-error" aria-live="polite"></span>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Mot de passe</label>
        <div class="input-wrapper">
          <input
            id="password" name="password" type="password" class="input"
            placeholder="••••••••" autocomplete="current-password"
            required aria-required="true"
          />
          <button type="button" class="btn-show-password" aria-label="Afficher le mot de passe" onclick="togglePassword(this)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <span class="field-error" id="password-error" aria-live="polite"></span>
      </div>

      <button type="submit" class="btn btn--primary btn--full" id="submit-btn">
        <span class="btn__text">Se connecter</span>
        <span class="btn__loader hidden" aria-hidden="true"></span>
      </button>
    </form>

    <p class="auth-card__footer">
      Pas encore de compte ? <a href="/inscription">Créer un compte</a>
    </p>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script>
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const btn = document.getElementById('submit-btn');
    const alert = document.getElementById('alert');

    clearErrors();
    setLoading(btn, true);

    const payload = {
      email: form.email.value.trim(),
      password: form.password.value,
    };

    try {
      const res = await fetch('/api/v1/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });

      const data = await res.json();

      if (!res.ok) {
        showAlert(data.detail || 'Erreur de connexion', 'error');
        return;
      }

      localStorage.setItem('yplaza_user', JSON.stringify(data.user));
      localStorage.setItem('yplaza_token', data.access_token);
      window.location.href = '/dashboard';

    } catch {
      showAlert('Impossible de contacter le serveur. Réessayez.', 'error');
    } finally {
      setLoading(btn, false);
    }
  });

  function clearErrors() {
    document.getElementById('email-error').textContent = '';
    document.getElementById('password-error').textContent = '';
    document.getElementById('alert').classList.add('hidden');
  }

  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = `alert alert--${type}`;
  }

  function setLoading(btn, loading) {
    btn.disabled = loading;
    btn.querySelector('.btn__text').classList.toggle('hidden', loading);
    btn.querySelector('.btn__loader').classList.toggle('hidden', !loading);
  }

  function togglePassword(btn) {
    const input = btn.previousElementSibling;
    input.type = input.type === 'password' ? 'text' : 'password';
    btn.setAttribute('aria-label', input.type === 'password' ? 'Afficher le mot de passe' : 'Masquer le mot de passe');
  }
</script>
{% endblock %}
