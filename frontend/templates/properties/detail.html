{% extends "base.html" %}
{% block title %}Détail du bien — Y-Plaza{% endblock %}

{% block content %}
<div class="container" style="padding-top:32px;padding-bottom:80px" id="property-detail">
  <!-- Skeleton de chargement -->
  <div id="detail-skeleton" aria-label="Chargement…">
    <div class="skeleton" style="height:14px;width:280px;margin-bottom:24px"></div>
    <div class="skeleton" style="height:420px;border-radius:var(--radius-md);margin-bottom:32px"></div>
    <div style="display:grid;grid-template-columns:1fr 360px;gap:40px">
      <div>
        <div class="skeleton" style="height:24px;width:60%;margin-bottom:12px"></div>
        <div class="skeleton" style="height:36px;width:80%;margin-bottom:20px"></div>
        <div class="skeleton" style="height:16px;margin-bottom:8px"></div>
        <div class="skeleton" style="height:16px;width:70%"></div>
      </div>
      <div class="skeleton" style="height:300px;border-radius:var(--radius-md)"></div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const propertyId = '{{ property_id }}';
  const token = localStorage.getItem('yplaza_token');

  const TYPE_LABELS = {
    apartment: 'Appartement', house: 'Maison',
    commercial: 'Local commercial', land: 'Terrain', office: 'Bureau',
  };
  const STATUS_LABELS = {
    available: 'Disponible', under_offer: 'Offre en cours',
    sold: 'Vendu', rented: 'Loué',
  };

  async function loadProperty() {
    try {
      const res = await fetch(`/api/v1/properties/${propertyId}`);
      if (!res.ok) {
        document.getElementById('property-detail').innerHTML =
          '<p style="color:var(--c-stone);text-align:center;padding:60px 0">Ce bien est introuvable ou a été supprimé.</p>';
        return;
      }
      const p = await res.json();
      renderDetail(p);
    } catch {
      document.getElementById('property-detail').innerHTML =
        '<p style="color:var(--c-stone);text-align:center;padding:60px 0">Impossible de charger ce bien. Réessayez.</p>';
    }
  }

  function renderDetail(p) {
    const txLabel = p.transaction_type === 'sale' ? 'Vente' : 'Location';
    const priceNum = parseInt(p.price).toLocaleString('fr-FR') + ' €' +
      (p.transaction_type === 'rental' ? '/mois' : '');
    const statusLabel = STATUS_LABELS[p.status] || p.status;
    const typeLabel = TYPE_LABELS[p.property_type] || p.property_type;

    const images = p.images && p.images.length
      ? p.images
      : [{ url: '/static/images/placeholder.svg', is_primary: true }];
    const mainImg = images.find(i => i.is_primary) || images[0];
    const secondImg = images.length > 1 ? images.find(i => !i.is_primary) || images[1] : null;

    document.title = `${p.title} — Y-Plaza`;

    const galleryHtml = `
      <div class="detail-gallery${!secondImg ? ' detail-gallery--single' : ''}" id="gallery">
        <div class="gallery-main">
          <img src="${mainImg.url}" alt="${p.title}" class="gallery-main__img" id="main-img" />
          <span class="badge badge--${p.transaction_type} badge--lg" style="position:absolute;top:16px;left:16px">${txLabel}</span>
          <button class="btn-favorite detail-favorite" id="btn-favorite"
            aria-label="Ajouter aux favoris" data-id="${p.id}" onclick="toggleFavorite(this)"
            style="position:absolute;top:12px;right:12px;background:rgba(0,0,0,.3);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
          </button>
        </div>
        ${secondImg ? `
        <div class="gallery-secondary" onclick="switchImage('${secondImg.url}', this)"
             role="button" tabindex="0" aria-label="Voir la photo secondaire">
          <img src="${secondImg.url}" alt="${p.title} — photo 2" class="gallery-secondary__img" id="secondary-img" />
        </div>` : ''}
      </div>`;

    document.getElementById('property-detail').innerHTML = `
      <nav aria-label="Fil d'Ariane" style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--c-stone);margin-bottom:24px">
        <a href="/" style="color:var(--c-stone);transition:color 160ms ease-out">Accueil</a>
        <span aria-hidden="true">›</span>
        <a href="/annonces" style="color:var(--c-stone);transition:color 160ms ease-out">Annonces</a>
        <span aria-hidden="true">›</span>
        <span aria-current="page" style="color:var(--c-ink)">${p.title}</span>
      </nav>

      ${galleryHtml}

      <div class="detail-layout" style="margin-top:32px">

        <!-- Colonne principale -->
        <div>
          <p style="font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--c-stone);margin-bottom:6px">${typeLabel}</p>
          <h1 style="font-family:'Cormorant Garamond',serif;font-weight:600;font-size:36px;color:var(--c-ink);line-height:1.2;margin-bottom:8px">${p.title}</h1>
          <p style="font-size:14px;color:var(--c-stone);margin-bottom:24px;display:flex;align-items:center;gap:6px">
            <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            ${p.address}, ${p.zip_code} ${p.city}
          </p>

          <!-- Specs -->
          <div class="specs-grid" aria-label="Caractéristiques">
            ${p.surface ? `<div class="spec-item">
              <svg class="spec-item__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M3 9h18"/></svg>
              <span class="spec-item__value">${p.surface} m²</span>
              <span class="spec-item__label">Surface</span>
            </div>` : ''}
            ${p.rooms ? `<div class="spec-item">
              <svg class="spec-item__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
              <span class="spec-item__value">${p.rooms}</span>
              <span class="spec-item__label">Pièce${p.rooms > 1 ? 's' : ''}</span>
            </div>` : ''}
            ${p.bedrooms ? `<div class="spec-item">
              <svg class="spec-item__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 9V5a1 1 0 0 1 1-1h18a1 1 0 0 1 1 1v4"/><path d="M2 9h20v11H2z"/><line x1="2" y1="14" x2="22" y2="14"/></svg>
              <span class="spec-item__value">${p.bedrooms}</span>
              <span class="spec-item__label">Chambre${p.bedrooms > 1 ? 's' : ''}</span>
            </div>` : ''}
            ${p.bathrooms ? `<div class="spec-item">
              <svg class="spec-item__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 12h16a1 1 0 0 1 1 1v3a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4v-3a1 1 0 0 1 1-1z"/><path d="M6 12V5a2 2 0 0 1 2-2h3v2.25"/></svg>
              <span class="spec-item__value">${p.bathrooms}</span>
              <span class="spec-item__label">Salle${p.bathrooms > 1 ? 's' : ''} de bain</span>
            </div>` : ''}
          </div>

          ${p.description ? `
          <div style="margin-top:32px">
            <h2 style="font-family:'Cormorant Garamond',serif;font-weight:500;font-size:24px;color:var(--c-forest);margin-bottom:12px">Description</h2>
            <p class="detail-description">${p.description}</p>
          </div>` : ''}

          <div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--c-border)">
            <p style="font-size:13px;color:var(--c-stone)"><strong style="font-weight:600">Référence :</strong> ${p.id.substring(0, 8).toUpperCase()}</p>
            <p style="font-size:13px;color:var(--c-stone);margin-top:4px"><strong style="font-weight:600">Mise en ligne :</strong> ${new Date(p.created_at).toLocaleDateString('fr-FR')}</p>
          </div>
        </div>

        <!-- Carte contact -->
        <aside>
          <div class="contact-card">
            <div class="contact-card__header">
              <span class="badge badge--${p.transaction_type} contact-card__badge">${txLabel}</span>
              <p style="font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.6)">
                ${p.transaction_type === 'sale' ? 'Prix de vente' : 'Loyer mensuel'}
              </p>
            </div>

            <div class="contact-card__body">
              <p class="contact-card__price">${priceNum}</p>
              <span class="badge badge--${p.status}" style="margin-bottom:16px">${statusLabel}</span>

              ${p.agency ? `
              <div style="margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--c-border)">
                <p style="font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--c-ink);margin-bottom:4px">${p.agency.name}</p>
                <p style="font-size:13px;color:var(--c-stone)">${p.agency.city}${p.agency.phone ? ' · ' + p.agency.phone : ''}</p>
              </div>` : ''}

              ${p.agent ? `
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
                <div style="width:36px;height:36px;border-radius:50%;background:var(--c-forest);display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;color:white;flex-shrink:0">${p.agent.first_name[0].toUpperCase()}</div>
                <div>
                  <p style="font-size:13px;font-weight:600;color:var(--c-ink)">${p.agent.first_name} ${p.agent.last_name}</p>
                  <p style="font-size:12px;color:var(--c-stone)">Agent immobilier</p>
                </div>
              </div>` : ''}

              <div id="contact-alert" class="alert hidden" role="alert" style="margin-bottom:12px"></div>

              <div id="contact-form" class="hidden">
                <form id="transaction-form" class="contact-form">
                  ${p.transaction_type === 'sale' ? `
                  <div class="form-group">
                    <label for="offered-price">Votre offre (€)</label>
                    <input id="offered-price" name="offered_price" type="number" class="input" min="1" value="${Math.round(p.price)}" required />
                  </div>` : `<input type="hidden" name="offered_price" value="${p.price}" />`}
                  <div class="form-group">
                    <label for="notes">Message (facultatif)</label>
                    <textarea id="notes" name="notes" class="textarea" rows="3" placeholder="Précisez votre demande…"></textarea>
                  </div>
                  <button type="submit" class="btn btn--primary" id="submit-contact">
                    <span class="btn__text">Envoyer</span>
                    <span class="btn__loader hidden"></span>
                  </button>
                </form>
              </div>

              <button class="btn btn--primary" id="btn-contact" style="width:100%;height:44px" onclick="openContactForm()">
                ${p.transaction_type === 'sale' ? 'Faire une offre' : 'Demander une visite'}
              </button>
            </div>
          </div>
        </aside>
      </div>
    `;

    setupTransactionForm(p);
  }

  function switchImage(url, btn) {
    const mainImg = document.getElementById('main-img');
    const secImg = document.getElementById('secondary-img');
    if (secImg) {
      const prevMain = mainImg.src;
      mainImg.src = url;
      secImg.src = prevMain;
      const secDiv = secImg.closest('.gallery-secondary');
      if (secDiv) secDiv.setAttribute('onclick', `switchImage('${prevMain}', this)`);
    } else {
      mainImg.src = url;
      document.querySelectorAll('.gallery-thumb').forEach(t => t.classList.remove('gallery-thumb--active'));
      if (btn?.classList?.contains('gallery-thumb')) btn.classList.add('gallery-thumb--active');
    }
  }

  function openContactForm() {
    if (!token) {
      window.location.href = '/connexion?next=' + encodeURIComponent(window.location.pathname);
      return;
    }
    document.getElementById('btn-contact').classList.add('hidden');
    document.getElementById('contact-form').classList.remove('hidden');
  }

  function setupTransactionForm(p) {
    const form = document.getElementById('transaction-form');
    if (!form) return;

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-contact');
      const alertEl = document.getElementById('contact-alert');
      btn.disabled = true;
      btn.querySelector('.btn__text').classList.add('hidden');
      btn.querySelector('.btn__loader').classList.remove('hidden');

      const data = Object.fromEntries(new FormData(form));
      const payload = {
        property_id: p.id,
        offered_price: Number(data.offered_price),
        notes: data.notes || null,
      };

      try {
        const res = await fetch('/api/v1/transactions/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
          body: JSON.stringify(payload),
        });
        const result = await res.json();
        if (!res.ok) {
          alertEl.textContent = result.detail || "Erreur lors de l'envoi.";
          alertEl.className = 'alert alert--error';
        } else {
          alertEl.textContent = 'Votre demande a bien été envoyée. Un agent vous contactera prochainement.';
          alertEl.className = 'alert alert--success';
          form.closest('#contact-form').classList.add('hidden');
        }
      } catch {
        alertEl.textContent = 'Impossible de contacter le serveur.';
        alertEl.className = 'alert alert--error';
      } finally {
        btn.disabled = false;
        btn.querySelector('.btn__text').classList.remove('hidden');
        btn.querySelector('.btn__loader').classList.add('hidden');
      }
    });
  }

  function toggleFavorite(btn) {
    if (!token) {
      window.location.href = '/connexion';
      return;
    }
    const id = btn.dataset.id;
    fetch(`/api/v1/properties/${id}/favorite`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}` },
    })
    .then(r => r.json())
    .then(data => {
      btn.classList.toggle('btn-favorite--active', data.is_favorite);
      btn.setAttribute('aria-label', data.is_favorite ? 'Retirer des favoris' : 'Ajouter aux favoris');
    });
  }

  loadProperty();
</script>
{% endblock %}
