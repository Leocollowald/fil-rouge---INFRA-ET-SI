{% extends "base.html" %}
{% block title %}Annonces — Y-Plaza{% endblock %}

{% block content %}

<!-- Header forêt -->
<header style="background:var(--c-forest); padding: 48px 0 40px">
  <div class="container">
    <h1 style="font-family:'Cormorant Garamond',serif;font-weight:600;font-size:40px;color:white;line-height:1.2;margin-bottom:8px">Nos annonces</h1>
    <p style="font-family:'DM Sans',sans-serif;color:rgba(255,255,255,.65);font-size:16px">Trouvez le bien qui vous correspond parmi toutes nos offres</p>
  </div>
</header>

<div class="container" style="display:grid;grid-template-columns:280px 1fr;gap:32px;padding-top:32px;padding-bottom:60px;align-items:start">

  <!-- Filtres sidebar -->
  <aside class="filters-panel" aria-label="Filtres de recherche">
    <p class="filters-panel__title">Filtres</p>
    <form id="filters-form">

      <div class="filters-panel__group">
        <span class="filters-panel__label">Type de transaction</span>
        <div class="pills-group">
          <input type="radio" name="transaction_type" value="" id="tx-all" checked />
          <label for="tx-all">Tous</label>
          <input type="radio" name="transaction_type" value="sale" id="tx-sale" />
          <label for="tx-sale">Vente</label>
          <input type="radio" name="transaction_type" value="rental" id="tx-rental" />
          <label for="tx-rental">Location</label>
        </div>
      </div>

      <div class="filters-panel__group">
        <label for="f-ptype" class="filters-panel__label">Type de bien</label>
        <select id="f-ptype" name="property_type" class="select">
          <option value="">Tous</option>
          <option value="apartment">Appartement</option>
          <option value="house">Maison</option>
          <option value="commercial">Local commercial</option>
          <option value="land">Terrain</option>
          <option value="office">Bureau</option>
        </select>
      </div>

      <div class="filters-panel__group">
        <label for="f-city" class="filters-panel__label">Ville</label>
        <input id="f-city" name="city" type="text" class="input" placeholder="Ex: Paris, Lyon…" />
      </div>

      <div class="filters-panel__group">
        <span class="filters-panel__label">Prix (€)</span>
        <div style="display:flex;gap:8px;align-items:center">
          <input name="min_price" type="number" class="input" placeholder="Min" min="0" style="flex:1" />
          <span style="color:var(--c-stone);flex-shrink:0">—</span>
          <input name="max_price" type="number" class="input" placeholder="Max" min="0" style="flex:1" />
        </div>
      </div>

      <div class="filters-panel__group">
        <label for="f-surface" class="filters-panel__label">Surface min (m²)</label>
        <input id="f-surface" name="min_surface" type="number" class="input" placeholder="Ex: 30" min="0" />
      </div>

      <div class="filters-panel__group">
        <label for="f-rooms" class="filters-panel__label">Pièces min</label>
        <input id="f-rooms" name="rooms" type="number" class="input" placeholder="Ex: 2" min="1" max="20" />
      </div>

      <button type="submit" class="btn btn--primary" style="width:100%;margin-top:8px">Appliquer</button>
      <button type="reset" class="btn btn--ghost" style="width:100%;margin-top:8px" id="reset-btn">Réinitialiser</button>
    </form>
  </aside>

  <!-- Résultats -->
  <section aria-labelledby="results-title">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
      <h2 id="results-title" style="font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;color:var(--c-stone)">
        <span id="results-count">—</span> bien(s) trouvé(s)
      </h2>
      <div>
        <label for="sort-select" class="sr-only">Trier par</label>
        <select id="sort-select" class="select" style="width:auto;min-width:160px">
          <option>Les plus récents</option>
        </select>
      </div>
    </div>

    <div class="properties-grid properties-grid--2col" id="properties-grid" aria-live="polite" aria-busy="true">
      <div class="skeleton-card" aria-hidden="true">
        <div class="skeleton skeleton-card__img"></div>
        <div class="skeleton-card__body"><div class="skeleton skeleton-card__line"></div><div class="skeleton skeleton-card__line skeleton-card__line--short"></div></div>
        <div class="skeleton-card__footer"></div>
      </div>
      <div class="skeleton-card" aria-hidden="true">
        <div class="skeleton skeleton-card__img"></div>
        <div class="skeleton-card__body"><div class="skeleton skeleton-card__line"></div><div class="skeleton skeleton-card__line skeleton-card__line--short"></div></div>
        <div class="skeleton-card__footer"></div>
      </div>
    </div>

    <nav class="pagination" id="pagination" aria-label="Pagination"></nav>
  </section>
</div>

{% endblock %}

{% block scripts %}
<script>
  let currentPage = 1;
  const params = new URLSearchParams(window.location.search);

  // Pré-remplir les filtres depuis l'URL
  document.querySelectorAll('#filters-form [name]').forEach(el => {
    const val = params.get(el.name);
    if (!val) return;
    if (el.type === 'radio') { if (el.value === val) el.checked = true; }
    else el.value = val;
  });

  function buildFilters() {
    const form = document.getElementById('filters-form');
    const data = new FormData(form);
    const q = new URLSearchParams();
    for (const [k, v] of data.entries()) { if (v) q.append(k, v); }
    q.set('page', currentPage);
    q.set('per_page', 12);
    return q;
  }

  async function loadProperties() {
    const grid = document.getElementById('properties-grid');
    grid.setAttribute('aria-busy', 'true');
    const q = buildFilters();
    try {
      const res = await fetch(`/api/v1/properties/?${q}`);
      const data = await res.json();
      document.getElementById('results-count').textContent = data.total;
      grid.setAttribute('aria-busy', 'false');

      if (!data.items.length) {
        grid.innerHTML = '<p style="color:var(--c-stone);grid-column:1/-1;text-align:center;padding:40px 0">Aucun bien ne correspond à votre recherche.</p>';
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      grid.innerHTML = data.items.map(renderCard).join('');
      renderPagination(data.page, data.pages);

      requestAnimationFrame(() => {
        grid.querySelectorAll('.property-card').forEach(el => el.classList.add('visible'));
      });
    } catch {
      grid.innerHTML = '<p style="color:var(--c-stone);grid-column:1/-1;text-align:center">Erreur lors du chargement.</p>';
    }
  }

  document.getElementById('filters-form').addEventListener('submit', (e) => {
    e.preventDefault(); currentPage = 1; loadProperties();
  });

  document.getElementById('reset-btn').addEventListener('click', () => {
    currentPage = 1; loadProperties();
  });

  function renderPagination(page, pages) {
    if (pages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
    let html = '';
    for (let i = 1; i <= pages; i++) {
      html += `<button class="pagination__btn ${i === page ? 'pagination__btn--active' : ''}" onclick="goToPage(${i})">${i}</button>`;
    }
    document.getElementById('pagination').innerHTML = html;
  }

  function goToPage(n) {
    currentPage = n; loadProperties();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function renderCard(p) {
    const img = p.images && p.images.length
      ? (p.images.find(i => i.is_primary)?.url || p.images[0].url)
      : '/static/images/placeholder.svg';
    const price = parseInt(p.price).toLocaleString('fr-FR') + ' €' +
      (p.transaction_type === 'rental' ? '/mois' : '');
    const txLabel = p.transaction_type === 'sale' ? 'Vente' : 'Location';
    const typeLabel = {apartment:'Appartement',house:'Maison',commercial:'Local commercial',land:'Terrain',office:'Bureau'}[p.property_type] || p.property_type;

    return `
      <article class="property-card">
        <a href="/annonces/${p.id}">
          <div class="property-card__media">
            <img src="${img}" alt="${p.title}" class="property-card__img" loading="lazy" />
            <span class="badge badge--${p.transaction_type} property-card__badge">${txLabel}</span>
          </div>
          <div class="property-card__body">
            <p style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--c-stone);margin-bottom:4px">${typeLabel}</p>
            <h3 class="property-card__title">${p.title}</h3>
            <p class="property-card__location">
              <svg aria-hidden="true" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              ${p.city} (${p.zip_code})
            </p>
            <div class="property-card__meta">
              ${p.surface ? `<span>${p.surface} m²</span>` : ''}
              ${p.rooms ? `<span>${p.rooms} pièce${p.rooms > 1 ? 's' : ''}</span>` : ''}
              ${p.bedrooms ? `<span>${p.bedrooms} ch.</span>` : ''}
              ${p.bathrooms ? `<span>${p.bathrooms} sdb</span>` : ''}
            </div>
          </div>
        </a>
        <div class="property-card__footer">
          <span class="property-card__price">${price}</span>
          <button class="btn-favorite" aria-label="Ajouter aux favoris" data-id="${p.id}" onclick="toggleFavorite(this)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          </button>
        </div>
      </article>`;
  }

  loadProperties();
</script>
{% endblock %}
